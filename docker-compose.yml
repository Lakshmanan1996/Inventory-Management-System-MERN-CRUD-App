version: "3.9"

services:
  frontend:
    build: ./frontend
    container_name: ims-frontend
    ports:
      - "7000:3000"     # host:container mapping
    environment:
      - PORT=3000
    depends_on:
      - backend

  backend:
    build: ./backend
    container_name: ims-backend
    ports:
      - "7100:3001"     # host:container mapping
    environment:
      - PORT=3001
      - MONGO_URI=mongodb://mongo:27017/ims
    depends_on:
      - mongo

  mongo:
    image: mongo:6
    container_name: ims-mongo
    ports:
      - "27017:27017"   # optional: only if you want host access
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
